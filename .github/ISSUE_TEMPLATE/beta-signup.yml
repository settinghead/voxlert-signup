name: "Early Access Request"
description: "Request early access to Pipevox"
title: "[Early Access] "
labels: ["early-access"]
body:
  - type: markdown
    attributes:
      value: |
        ## Pipevox Early Access
        Thanks for your interest. Fill this out and we'll reach out with access details.

  - type: input
    id: name
    attributes:
      label: Name
      placeholder: "Your name"
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Email
      description: "How we'll contact you with access details"
      placeholder: "you@example.com"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: checkboxes
    id: tools
    attributes:
      label: "AI tools / automation you use"
      description: "Check all that apply"
      options:
        - label: Claude Code
        - label: Cursor
        - label: GitHub Copilot
        - label: Cline / Continue
        - label: n8n / Make / Zapier
        - label: Custom agent / LangChain / CrewAI
        - label: Other

  - type: dropdown
    id: usecase
    attributes:
      label: "Primary use case"
      options:
        - "Voice notifications for AI coding agents"
        - "Audio alerts for automations or pipelines"
        - "Event-to-announcement for apps or bots"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: "Tell us more about your setup"
      description: "Optional — what would you pipe through Pipevox?"
      placeholder: "e.g. I run several Claude Code sessions at once and want to hear which one finished"
    validations:
      required: false

  - type: checkboxes
    id: consent
    attributes:
      label: Consent
      options:
        - label: "I'm OK with the maintainer contacting me at the email above about early access"
          required: true
